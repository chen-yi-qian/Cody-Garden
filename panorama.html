<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>全景预览 - Cody Garden</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
    body{
            overflow:hidden;
                background:#000;
                    opacity:0;
                        transition:opacity 0.8s ease;
    }
      body.loaded{opacity:1;}
        canvas{
                display:block;
                    width:100vw;
                        height:100vh;
        }
          /* 高级返回按钮 */
            .back-btn{
                    position:fixed;
                        top:24px;
                            left:24px;
                                background:rgba(0,238,255,0.9);
                                    color:#000;
                                        border:none;
                                            border-radius:12px;
                                                padding:10px 18px;
                                                    font-weight:600;
                                                        font-size:14px;
                                                            cursor:pointer;
                                                                box-shadow:0 4px 12px rgba(0,238,255,0.3);
                                                                    transition:all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
                                                                        z-index:10;
            }
              .back-btn:hover{
                      transform:scale(1.05);
                          box-shadow:0 6px 16px rgba(0,238,255,0.5);
              }
              </style>
              </head>
              <body>
              <button class="back-btn" onclick="history.back()">← 返回导览</button>

              <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
              <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

              <script>
                // 初始化场景
                  const scene = new THREE.Scene();
                    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
                      camera.position.set(0, 0, 0);

                        const renderer = new THREE.WebGLRenderer({
                                antialias:true,
                                    powerPreference:"high-performance"
                        });
                          renderer.setSize(window.innerWidth, window.innerHeight);
                            renderer.setPixelRatio(window.devicePixelRatio);
                              document.body.appendChild(renderer.domElement);

                                // 流畅控制器（支持触摸+阻尼）
                                  const controls = new THREE.OrbitControls(camera, renderer.domElement);
                                    controls.enableDamping = true;
                                      controls.dampingFactor = 0.05;
                                        controls.enableZoom = true;
                                          controls.zoomSpeed = 0.8;
                                            controls.enablePan = false;
                                              controls.autoRotate = false;
                                                controls.minDistance = 0.1;
                                                  controls.maxDistance = 100;
                                                    controls.touches.ONE = THREE.TOUCH.ROTATE;
                                                      controls.touches.TWO = THREE.TOUCH.DOLLY_ROTATE;

                                                        // 加载2:1全景图
                                                          const params = new URLSearchParams(window.location.search);
                                                            const id = params.get('id') || '1';
                                                              const textureLoader = new THREE.TextureLoader();
                                                                textureLoader.load(
                                                                        `panos/${id}.jpg`,
                                                                            (texture) => {
                                                                                      texture.mapping = THREE.EquirectangularReflectionMapping;
                                                                                            texture.colorSpace = THREE.SRGBColorSpace;
                                                                                                  scene.background = texture;
                                                                                                        // 页面淡入
                                                                                                              document.body.classList.add('loaded');
                                                                            },
                                                                                undefined,
                                                                                    (err) => console.error('全景图加载失败', err)
                                                                );

                                                                  // 窗口自适应
                                                                    window.addEventListener('resize', () => {
                                                                            camera.aspect = window.innerWidth/window.innerHeight;
                                                                                camera.updateProjectionMatrix();
                                                                                    renderer.setSize(window.innerWidth, window.innerHeight);
                                                                    });

                                                                      // 渲染循环
                                                                        function animate(){
                                                                                requestAnimationFrame(animate);
                                                                                    controls.update();
                                                                                        renderer.render(scene, camera);
                                                                        }
                                                                          animate();
                                                                          </script>
                                                                          </body>
                                                                          </html>
                                                                          
                                                                        }
                                                                    })
                                                                            }
                                                                )
                        })
              }
            }
        }
    }
